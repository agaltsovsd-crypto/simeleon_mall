<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simoleon Mall</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  :root{
    --plumbob:#4fd12b; --plumbob-dark:#2e9a12; --plumbob-light:#8dff5f;
    --sky-top:#7ec8f0; --sky-bot:#aee3ff;
    --panel:#0f2a3f; --panel-2:#16385a; --panel-3:#1d4b76;
    --cream:#f5f1e4; --gold:#ffd23f; --gold-deep:#e8a72b; --ink:#0b1e2d; --red:#ff6b6b;
  }
  body{
    font-family:'Fredoka',sans-serif; min-height:100vh; color:var(--ink);
    background:
      radial-gradient(circle at 20% 8%, rgba(255,255,255,.4), transparent 42%),
      radial-gradient(circle at 82% 92%, rgba(79,209,43,.18), transparent 48%),
      linear-gradient(180deg,var(--sky-top),var(--sky-bot));
    padding:calc(16px + var(--tg-safe-top,0px)) 14px calc(50px + var(--tg-safe-bottom,0px));
    overflow-x:hidden;
  }
  .decor{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .float-bob{position:absolute;width:22px;height:38px;background:var(--plumbob);
    clip-path:polygon(50% 0,100% 35%,50% 100%,0 35%);opacity:.16;animation:bob 7s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-22px) rotate(8deg)}}
  .wrap{max-width:860px;margin:0 auto;position:relative;z-index:1}
  header{text-align:center;margin-bottom:18px}
  .crown{width:34px;height:56px;margin:0 auto 6px;
    background:linear-gradient(180deg,var(--plumbob-light),var(--plumbob) 55%,var(--plumbob-dark));
    clip-path:polygon(50% 0,100% 35%,50% 100%,0 35%);
    filter:drop-shadow(0 6px 10px rgba(46,154,18,.5));animation:spinbob 4s ease-in-out infinite}
  @keyframes spinbob{0%,100%{transform:rotateY(0) translateY(0)}50%{transform:rotateY(180deg) translateY(-8px)}}
  h1{font-size:clamp(30px,7vw,46px);font-weight:700;color:var(--panel);
    text-shadow:2px 2px 0 #fff,4px 4px 0 rgba(15,42,63,.15);letter-spacing:-.5px;line-height:1}
  .tagline{font-size:13px;color:var(--panel-2);opacity:.75;font-weight:500;margin-top:5px}
  .wallet{background:linear-gradient(160deg,var(--panel),var(--panel-2));border:4px solid #fff;border-radius:24px;
    box-shadow:0 14px 32px rgba(15,42,63,.35),inset 0 2px 0 rgba(255,255,255,.15);padding:18px 22px;margin-bottom:16px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .wallet-label{color:#9fd8ff;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .wallet-amount{font-family:'Space Mono',monospace;font-size:clamp(30px,8vw,50px);color:var(--gold);
    text-shadow:0 3px 0 var(--gold-deep),0 6px 14px rgba(0,0,0,.4);line-height:1;margin-top:2px;display:flex;align-items:center;gap:8px}
  .simoleon{display:inline-grid;place-items:center;width:.82em;height:.82em;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff2a8,var(--gold) 45%,var(--gold-deep));
    color:var(--ink);font-size:.5em;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .wallet-amount.flash{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12);filter:brightness(1.4)}100%{transform:scale(1)}}
  .bag{text-align:right;color:#9fd8ff;font-size:11px;font-weight:500}
  .bag-count{font-family:'Space Mono';font-size:26px;color:#fff;display:block}
  .tabs{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
  .tab{font-family:'Fredoka';font-weight:600;font-size:12px;padding:8px 14px;border-radius:30px;
    border:2px solid var(--panel);background:#fff;color:var(--panel);cursor:pointer;transition:all .15s}
  .tab.active{background:var(--plumbob);color:#fff;border-color:var(--plumbob-dark);box-shadow:0 4px 12px rgba(79,209,43,.4)}
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:18px}
  .card{background:var(--cream);border:3px solid var(--panel);border-radius:18px;padding:15px 12px 13px;text-align:center;
    cursor:pointer;user-select:none;box-shadow:0 6px 0 var(--panel),0 10px 18px rgba(15,42,63,.2);
    transition:transform .08s,box-shadow .08s;position:relative;overflow:hidden}
  .card:active{transform:translateY(4px);box-shadow:0 2px 0 var(--panel),0 4px 10px rgba(15,42,63,.2)}
  .card .emoji{font-size:36px;display:block;margin-bottom:6px}
  .card .name{font-weight:600;font-size:13px;color:var(--panel);line-height:1.2}
  .card .desc{font-size:10px;color:var(--panel-3);opacity:.85;margin:3px 0 6px;min-height:24px}
  .card .price{font-family:'Space Mono';font-weight:700;color:var(--gold-deep);font-size:14px}
  .card.cant{opacity:.42;filter:grayscale(.55);cursor:not-allowed}
  .controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .btn{font-family:'Fredoka';font-weight:600;font-size:12px;padding:9px 18px;border-radius:30px;
    border:2px solid var(--panel);background:#fff;color:var(--panel);cursor:pointer;box-shadow:0 3px 0 var(--panel)}
  .btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--panel)}
  .btn.cheat{background:var(--plumbob);color:#fff;border-color:var(--plumbob-dark);box-shadow:0 3px 0 var(--plumbob-dark)}
  .btn.mute{background:var(--red);color:#fff;border-color:#c94b4b;box-shadow:0 3px 0 #c94b4b}
  .receipt{background:rgba(255,255,255,.78);border:3px solid var(--panel);border-radius:20px;padding:18px 20px;backdrop-filter:blur(5px)}
  .receipt h2{font-size:17px;color:var(--panel);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
  .row{display:flex;align-items:center;justify-content:space-between;padding:9px 4px;
    border-bottom:1px dashed rgba(15,42,63,.25);font-size:13px;animation:slidein .3s ease}
  @keyframes slidein{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
  .row:last-child{border-bottom:none}
  .row .what{display:flex;align-items:center;gap:7px;font-weight:500;color:var(--panel)}
  .row .what .t{opacity:.45;font-size:10px}
  .row .cost{font-family:'Space Mono';font-weight:700;color:var(--red)}
  .empty{text-align:center;color:var(--panel-2);opacity:.55;padding:14px;font-style:italic}
  .total-line{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:2px solid var(--panel);font-weight:700;color:var(--panel)}
  .total-line .sum{font-family:'Space Mono';color:var(--red)}
  .popup{position:fixed;font-family:'Space Mono';font-weight:700;font-size:24px;color:var(--red);
    pointer-events:none;z-index:60;text-shadow:0 2px 4px rgba(0,0,0,.3);animation:floatup 1s ease-out forwards}
  @keyframes floatup{0%{opacity:1;transform:translateY(0) scale(.8)}100%{opacity:0;transform:translateY(-70px) scale(1.2)}}
  .minibob{position:fixed;pointer-events:none;z-index:59;width:14px;height:24px;
    background:var(--plumbob);clip-path:polygon(50% 0,100% 35%,50% 100%,0 35%);animation:burst .8s ease-out forwards}
  @keyframes burst{0%{opacity:1;transform:translate(0,0) scale(.5) rotate(0)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1) rotate(90deg)}}
  .toast{position:fixed;left:50%;bottom:calc(24px + var(--tg-safe-bottom,0px));transform:translateX(-50%);
    background:var(--panel);color:#fff;padding:12px 22px;border-radius:30px;font-weight:600;font-size:14px;
    border:2px solid var(--plumbob);box-shadow:0 8px 20px rgba(0,0,0,.3);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .credit{text-align:center;margin-top:18px;color:var(--panel);font-weight:600;font-size:13px;opacity:.7;letter-spacing:.5px}
  .credit b{color:var(--plumbob-dark)}
</style>
</head>
<body>
<div class="decor" id="decor"></div>
<div class="wrap">
  <header>
    <div class="crown"></div>
    <h1>Simoleon Mall</h1>
    <div class="tagline">трать симолеоны в своё удовольствие ✦</div>
  </header>
  <div class="wallet">
    <div><div class="wallet-label">Баланс семьи</div>
    <div class="wallet-amount" id="wallet"><span class="simoleon">§</span><span id="bal">20000</span></div></div>
    <div class="bag">покупок<span class="bag-count" id="count">0</span></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="shop" id="shop"></div>
  <div class="controls">
    <button class="btn cheat" id="motherlode">💰 motherlode (+§50 000)</button>
    <button class="btn cheat" id="kaching">✦ kaching (+§1 000)</button>
    <button class="btn" id="reset">↺ Новая игра</button>
    <button class="btn mute" id="mute">🔊 Звук: вкл</button>
  </div>
  <div class="receipt">
    <h2>История списаний</h2>
    <div id="rows"><div class="empty">Пока ничего не куплено. Обустрой свой участок! 🏡</div></div>
    <div class="total-line" id="totalLine" style="display:none"><span>Всего потрачено</span><span class="sum" id="totalSum">§0</span></div>
  </div>
  <div class="credit">made with 💚 by <b>agalts</b></div>
</div>
<div class="toast" id="toast"></div>
<audio id="chaching" preload="auto" src="data:audio/mp4;base64,AAAAHGZ0eXBNNEEgAAAAAE00QSBtcDQyaXNvbQAA39xmcmVlAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA       {e:'🍣',n:'Суши-сет',d:'ресторанный',p:90},{e:'🥗',n:'Салат',d:'полезный',p:18},
      {e:'☕',n:'Кофемашина',d:'бариста дома',p:350},{e:'🍰',n:'Торт',d:'на праздник',p:60},
      {e:'🧃',n:'Смузи',d:'витаминный',p:12},{e:'🍺',n:'Барная стойка',d:'для гостей',p:1400}],
    '🎮 Развлечения':[
      {e:'🎮',n:'Приставка',d:'весь вечер',p:900},{e:'💻',n:'Компьютер',d:'мощный',p:2300},
      {e:'🎸',n:'Гитара',d:'прокачай навык',p:550},{e:'🎹',n:'Пианино',d:'классика',p:3500},
      {e:'📚',n:'Книжный шкаф',d:'логика +',p:400},{e:'🏓',n:'Стол для пинг-понга',d:'веселье',p:700},
      {e:'🎯',n:'Дартс',d:'для бара',p:180},{e:'🕹️',n:'Аркадный автомат',d:'ретро',p:1800}],
    '💪 Спорт и уход':[
      {e:'🏋️',n:'Тренажёр',d:'форма +',p:1500},{e:'🚲',n:'Велотренажёр',d:'кардио',p:900},
      {e:'💆',n:'СПА-набор',d:'релакс',p:200},{e:'🧴',n:'Уход за кожей',d:'свежесть',p:110},
      {e:'💅',n:'Салон красоты',d:'преображение',p:250},{e:'👟',n:'Кроссовки',d:'для пробежек',p:130},
      {e:'🧘',n:'Коврик для йоги',d:'спокойствие',p:60},{e:'💇',n:'Новая причёска',d:'смена образа',p:95}],
    '👕 Гардероб':[
      {e:'👕',n:'Футболка',d:'повседневная',p:35},{e:'👔',n:'Костюм',d:'на работу',p:320},
      {e:'👗',n:'Платье',d:'нарядное',p:180},{e:'👠',n:'Туфли',d:'на выход',p:150},
      {e:'👟',n:'Кеды',d:'на каждый день',p:80},{e:'🧥',n:'Пальто',d:'тёплое',p:400},
      {e:'👜',n:'Сумка',d:'стильная',p:220},{e:'🕶️',n:'Очки',d:'солнцезащитные',p:70}],
    '💎 Роскошь':[
      {e:'🚗',n:'Автомобиль',d:'мечта участка',p:15000},{e:'🏊',n:'Бассейн',d:'во дворе',p:6000},
      {e:'💎',n:'Кольцо',d:'с бриллиантом',p:1200},{e:'⌚',n:'Часы',d:'элитные',p:800},
      {e:'🎺',n:'Джакузи-вечеринка',d:'для гостей',p:2200},{e:'🏰',n:'Пристройка',d:'новое крыло',p:12000},
      {e:'🛥️',n:'Лодка',d:'для отдыха',p:9000},{e:'🌋',n:'Камин',d:'атмосфера',p:1600}],
  };

  let balance=20000,count=0,spent=0,soundOn=true,activeCat=Object.keys(catalog)[0];
  const audio=document.getElementById('chaching');
  const bal=document.getElementById('bal'),wallet=document.getElementById('wallet');
  const countEl=document.getElementById('count'),shop=document.getElementById('shop');
  const rows=document.getElementById('rows'),totalLine=document.getElementById('totalLine'),totalSum=document.getElementById('totalSum');
  const toast=document.getElementById('toast');
  const fmt=n=>n.toLocaleString('ru-RU');
  function playSound(){if(!soundOn)return;audio.currentTime=0;audio.play().catch(()=>{});}
  let toastTimer;
  function showToast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('show'),1600);}

  function renderTabs(){const tabs=document.getElementById('tabs');tabs.innerHTML='';
    Object.keys(catalog).forEach(cat=>{const t=document.createElement('button');
      t.className='tab'+(cat===activeCat?' active':'');t.textContent=cat;
      t.onclick=()=>{activeCat=cat;haptic('light');renderTabs();renderShop();};tabs.appendChild(t);});}
  function renderShop(){shop.innerHTML='';catalog[activeCat].forEach(it=>{
      const c=document.createElement('button');c.className='card'+(balance<it.p?' cant':'');
      c.innerHTML=`<span class="emoji">${it.e}</span><div class="name">${it.n}</div><div class="desc">${it.d}</div><div class="price">§${fmt(it.p)}</div>`;
      c.onclick=e=>buy(it,e);shop.appendChild(c);});}
  function buy(it,e){if(balance<it.p){shake(e.currentTarget);haptic('rigid');showToast('Недостаточно симолеонов!');return;}
    balance-=it.p;count++;spent+=it.p;playSound();haptic('medium');
    bal.textContent=fmt(balance);countEl.textContent=count;
    wallet.classList.remove('flash');void wallet.offsetWidth;wallet.classList.add('flash');
    pricePopup(e,it.p);bobBurst(e);logRow(it);renderShop();}
  function pricePopup(e,p){const el=document.createElement('div');el.className='popup';el.textContent='−§'+fmt(p);
    el.style.left=(e.clientX-16)+'px';el.style.top=(e.clientY-20)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
  function bobBurst(e){for(let i=0;i<6;i++){const h=document.createElement('div');h.className='minibob';
    h.style.left=e.clientX+'px';h.style.top=e.clientY+'px';
    const ang=Math.random()*Math.PI*2,dist=40+Math.random()*40;h.style.setProperty('--dx',Math.cos(ang)*dist+'px');
    h.style.setProperty('--dy',(Math.sin(ang)*dist-20)+'px');document.body.appendChild(h);setTimeout(()=>h.remove(),800);}}
  function shake(el){el.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:250});}
  function logRow(it){if(rows.querySelector('.empty'))rows.innerHTML='';
    const time=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const r=document.createElement('div');r.className='row';
    r.innerHTML=`<span class="what">${it.e} ${it.n} <span class="t">${time}</span></span><span class="cost">−§${fmt(it.p)}</span>`;
    rows.prepend(r);totalLine.style.display='flex';totalSum.textContent='§'+fmt(spent);}
  document.getElementById('motherlode').onclick=()=>{balance+=50000;bal.textContent=fmt(balance);playSound();haptic('heavy');
    wallet.classList.remove('flash');void wallet.offsetWidth;wallet.classList.add('flash');showToast('💰 motherlode! +§50 000');renderShop();};
  document.getElementById('kaching').onclick=()=>{balance+=1000;bal.textContent=fmt(balance);playSound();haptic('light');
    wallet.classList.remove('flash');void wallet.offsetWidth;wallet.classList.add('flash');showToast('✦ kaching! +§1 000');renderShop();};
  document.getElementById('reset').onclick=()=>{balance=20000;count=0;spent=0;bal.textContent=fmt(balance);countEl.textContent=0;
    rows.innerHTML='<div class="empty">Пока ничего не куплено. Обустрой свой участок! 🏡</div>';totalLine.style.display='none';renderShop();haptic('light');showToast('↺ Новая игра');};
  const muteBtn=document.getElementById('mute');
  muteBtn.onclick=()=>{soundOn=!soundOn;muteBtn.textContent=soundOn?'🔊 Звук: вкл':'🔇 Звук: выкл';if(soundOn)playSound();haptic('light');};
  renderTabs();renderShop();
</script>
</body>
</html>
